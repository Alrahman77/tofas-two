<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امتحان JavaScript | المنقذ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff7e21; --bg: #0b0d0f; --card: #16181a; --text: #e0e0e0; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* المساحة المزخرفة للوجو */
        /* التعديل المطلوب في ملف الـ CSS */
.main-logo {
    max-width: 350px; /* يمكنك التحكم في حجم اللوجو من هنا */
    height: auto;
    z-index: 10;
    position: relative;
    /* لإضافة لمسة جمالية تجعل اللوجو يبرز فوق الزخرفة */
    filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
}

.header-decoration {
    /* تأكد أن هذا الكلاس لديه flex ليتوسط اللوجو */
    display: flex;
    justify-content: center;
    align-items: center;
    padding-bottom: 60px; /* لرفع اللوجو بعيداً عن حافة الكارت */
}


.container {
    max-width: 850px;
    margin: 0 auto; /* حذفنا المارجن السالب */
    padding: 40px 20px; /* أضفنا بادينج علوي مريح */
    position: relative;
    z-index: 5;
}

.quiz-card {
    background: var(--card);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.7);
    border: 1px solid #333;
    margin-top: -80px; /* نرفع الكارت فقط وليس الحاوية كلها */
}
        .code-box {
            background: #000; color: #9cdceb; padding: 20px; border-radius: 10px;
            direction: ltr; text-align: left; font-family: 'Consolas', monospace;
            margin: 20px 0; border-left: 5px solid var(--primary); font-size: 1.1rem;
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option {
            background: #25282c; padding: 15px; border: 2px solid #3d4248;
            border-radius: 12px; cursor: pointer; text-align: center; transition: 0.2s;
        }
        .option:hover { border-color: var(--primary); }
        .option.active { background: var(--primary); color: #000; border-color: var(--primary); }

        .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; }
        button { padding: 10px 35px; border: none; border-radius: 8px; background: var(--primary); font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        #result-screen { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="header-decoration"><img src="لوجو المنقذ.png" class="main-logo" alt="لوجو المنقذ">
    </div>

<div class="container">
    <div id="quiz-screen">
        <div class="quiz-card">
            <div id="q-text" style="font-weight: bold; font-size: 1.2rem;"></div>
            <div class="code-box" id="q-code"></div>
            <div class="options-grid" id="q-options"></div>
        </div>
        <div class="nav-btns">
            <button id="prev-btn" disabled>السابق</button>
            <button id="next-btn">التالي</button>
        </div>
    </div>

    <div id="result-screen" class="quiz-card">
        <h2>النتيجة النهائية</h2>
        <div style="font-size: 4rem; color: var(--primary); margin: 20px;" id="final-score"></div>
        <button onclick="location.reload()">إعادة المحاولة</button>
    </div>
</div>

<script>
    const questions = [
        // العبارات الشرطية
        { q: "ما هو مخرج الكود التالي؟", code: "let x = 10;\nif (x > 5) {\n  console.log('Success');\n}", a: ["Success", "5", "10", "لا يطبع شيء"], c: 0 },
        { q: "ماذا يطبع البرنامج في هذه الحالة؟", code: "let grade = 40;\nif (grade >= 50) {\n  console.log('Pass');\n} else {\n  console.log('Fail');\n}", a: ["Pass", "Fail", "50", "40"], c: 1 },
        { q: "توقع مخرج التفرع المتعدد:", code: "let a = 5;\nif (a > 10) {\n  console.log('Big');\n} else if (a == 5) {\n  console.log('Equal');\n}", a: ["Big", "Equal", "5", "10"], c: 1 },
        
        // الحلقات التكرارية (تركيز على i)
        { q: "كم مرة سيتم تكرار الجملة التالية؟", code: "for (let i = 1; i <= 3; i++) {\n  console.log('Hi');\n}", a: ["مرة واحدة", "مرتين", "3 مرات", "4 مرات"], c: 2 },
        { q: "ما هي قيمة العداد i في الدورة الثانية؟", code: "for (let i = 1; i <= 5; i++) {\n  // الدورة الثانية\n}", a: ["1", "2", "3", "5"], c: 1 },
        { q: "ما هو الناتج النهائي لجمع i؟", code: "let sum = 0;\nfor (let i = 1; i <= 3; i++) {\n  sum = sum + i;\n}\nconsole.log(sum);", a: ["3", "5", "6", "1"], c: 2 },
        { q: "ما هو مخرج العملية الحسابية للعداد؟", code: "for (let i = 1; i <= 2; i++) {\n  console.log(i * 10);\n}", a: ["10, 20", "1, 2", "10, 10", "20, 10"], c: 0 },
        { q: "ماذا يطبع الكود عند استخدام طول المصفوفة؟", code: "let names = ['Ali', 'Ahmed'];\nfor (let i = 0; i < names.length; i++) {\n  console.log(i);\n}", a: ["Ali, Ahmed", "1, 2", "0, 1", "0, 1, 2"], c: 2 },
        
        // الدوال Functions
        { q: "كيف نستدعي الدالة التالية؟", code: "function welcome() {\n  console.log('Hello');\n}\n// الاستدعاء هو:", a: ["welcome;", "welcome();", "function welcome();", "call welcome"], c: 1 },
        { q: "ما هو مخرج استدعاء دالة الجمع؟", code: "function add(a, b) {\n  return a + b;\n}\nconsole.log(add(3, 4));", a: ["34", "7", "3", "4"], c: 1 },
        { q: "توقع مخرج الدالة عند الضرب:", code: "function multi(n) {\n  return n * 2;\n}\nconsole.log(multi(5));", a: ["5", "2", "10", "25"], c: 2 },
        { q: "ماذا سيحدث هنا؟", code: "function test() {\n  return 'Done';\n}\nconsole.log(test());", a: ["Done", "test", "Error", "لا شيء"], c: 0 }
    ];

    // تكملة الأسئلة لـ 20
    for(let i=13; i<=20; i++) {
        questions.push({
            q: "سؤال تتبع رقم " + i,
            code: "let x = " + i + ";\nif (x > 15) {\n  console.log('High');\n} else {\n  console.log('Low');\n}",
            a: ["High", "Low", "15", "x"],
            c: i > 15 ? 0 : 1
        });
    }

    let current = 0;
    let scores = 0;
    let userAnswers = new Array(questions.length).fill(null);

    function display() {
        const item = questions[current];
        document.getElementById('q-text').innerText = `سؤال ${current+1}: ${item.q}`;
        document.getElementById('q-code').innerText = item.code;
        const options = document.getElementById('q-options');
        options.innerHTML = '';
        item.a.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = `option ${userAnswers[current] === idx ? 'active' : ''}`;
            div.innerText = opt;
            div.onclick = () => { userAnswers[current] = idx; display(); };
            options.appendChild(div);
        });
        document.getElementById('prev-btn').disabled = current === 0;
        document.getElementById('next-btn').innerText = current === questions.length - 1 ? 'إنهاء' : 'التالي';
    }

    document.getElementById('next-btn').onclick = () => {
        if(current < questions.length - 1) { current++; display(); }
        else {
            let score = 0;
            userAnswers.forEach((ans, i) => { if(ans === questions[i].c) score++; });
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score + ' / 20';
        }
    };

    document.getElementById('prev-btn').onclick = () => { if(current > 0) { current--; display(); } };

    display();
</script>
</body>
</html>
